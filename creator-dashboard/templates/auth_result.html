<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#15161A">
  <title>Switchboard — Connection result</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .result-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-5);
      gap: var(--space-3);
    }
    .result-screen__icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: var(--space-2);
    }
    .result-screen__icon--success { background: var(--success-dim); color: var(--success); }
    .result-screen__icon--error { background: var(--danger-dim); color: var(--danger); }
    .result-screen h1 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      margin: 0;
    }
    .result-screen p {
      color: var(--text-muted);
      max-width: 320px;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="result-screen">
    {% if success %}
    <div class="result-screen__icon result-screen__icon--success">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>{{ platform }} connected</h1>
    <p>You can close this tab and return to Switchboard.</p>
    {% else %}
    <div class="result-screen__icon result-screen__icon--error">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <h1>Couldn't connect {{ platform }}</h1>
    <p>{{ message }}</p>
    {% endif %}
    <button class="btn btn--accent" onclick="window.location.href='/'" style="margin-top: var(--space-3);">Back to Switchboard</button>
  </div>
</body>
</html>
